# code: language=ansible
- name: Verify that multi-instance list or search pattern is set
  assert:
    that: postfix_multi_instance_list | length > 0 or postfix_multi_instance_search_path | length > 0
  when: postfix_multi_instance_enable

- name: Verify that username and passsword are set
  assert:
    that:
      - postfix_relayhost_username | d('') | length > 0
      - postfix_relayhost_password | d('') | length > 0
  when: postfix_relayhost_auth
